<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} — 자기소개서</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06080f; --bg2: #0c0e1a; --bg3: #111428;
      --text: #e8ecf4; --muted: #5e6e8a; --sub: #8a9ab8;
      --accent: #8b7cf8; --accent2: #5f8aff; --gold: #e8b84b;
      --border: #181e30; --border2: #222840;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      line-height: 1.7; -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }

    /* ── Password overlay ── */
    #pw-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
    }
    #pw-box {
      display: flex; flex-direction: column; align-items: center;
      gap: 14px; padding: 44px 36px;
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 18px; min-width: 280px;
    }
    #pw-logo { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--text); }
    #pw-sub { font-size: .8rem; color: var(--muted); }
    #pw-input {
      width: 100%; padding: 10px 14px;
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 9px; color: var(--text);
      font-size: 1rem; text-align: center; letter-spacing: 4px;
      font-family: 'JetBrains Mono', monospace; outline: none;
    }
    #pw-input:focus { border-color: var(--accent); }
    #pw-btn {
      width: 100%; padding: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: 9px;
      font-size: .88rem; cursor: pointer;
    }
    #pw-btn:hover { opacity: .88; }
    #pw-error { color: #f87171; font-size: .8rem; display: none; }

    /* ── Nav ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: 58px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem;
      background: rgba(6,8,15,.8); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--text); }
    .nav-back {
      font-size: .78rem; font-weight: 500; letter-spacing: .06em; text-transform: uppercase;
      color: var(--muted); transition: color .2s;
    }
    .nav-back:hover { color: var(--text); }

    /* ── Layout ── */
    .page-wrap {
      max-width: 760px; margin: 0 auto;
      padding: 100px 2rem 5rem;
    }

    /* ── Header ── */
    .entry-meta {
      font-family: 'JetBrains Mono', monospace; font-size: .68rem;
      color: var(--muted); letter-spacing: .1em; text-transform: uppercase;
      margin-bottom: .8rem;
    }
    .entry-title {
      font-family: 'Playfair Display', serif; font-size: 1.9rem; font-weight: 700;
      color: var(--text); line-height: 1.2; margin-bottom: .5rem;
    }
    .entry-company {
      font-size: .88rem; color: var(--accent); font-weight: 500; margin-bottom: .3rem;
    }
    .entry-date {
      font-family: 'JetBrains Mono', monospace; font-size: .72rem; color: var(--muted);
    }
    .entry-divider {
      height: 1px; background: var(--border2); margin: 2rem 0;
    }

    /* ── Content typography ── */
    .entry-content { color: var(--sub); font-size: .95rem; line-height: 1.9; }
    .entry-content h2 {
      font-family: 'Playfair Display', serif; font-size: 1.2rem;
      color: var(--text); margin: 2.2rem 0 .8rem;
      padding-bottom: .4rem; border-bottom: 1px solid var(--border);
    }
    .entry-content h3 {
      font-size: .95rem; font-weight: 600; color: var(--text);
      margin: 1.6rem 0 .5rem;
    }
    .entry-content p { margin-bottom: 1.1rem; }
    .entry-content ul, .entry-content ol {
      padding-left: 1.4rem; margin-bottom: 1rem;
    }
    .entry-content li { margin-bottom: .35rem; }
    .entry-content strong { color: var(--text); font-weight: 600; }
    .entry-content blockquote {
      border-left: 3px solid var(--accent); padding-left: 1.2rem;
      color: var(--muted); margin: 1.2rem 0; font-style: italic;
    }

    /* ── Cursor glow ── */
    #cursor-glow {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(600px circle at -999px -999px, rgba(139,124,248,.10) 0%, transparent 70%);
    }
  </style>
</head>
<body>

<div id="pw-overlay">
  <div id="pw-box">
    <div id="pw-logo">자기소개서</div>
    <div id="pw-sub">비밀번호를 입력하세요</div>
    <input id="pw-input" type="password" placeholder="••••••" autofocus />
    <button id="pw-btn">확인</button>
    <span id="pw-error">비밀번호가 틀렸습니다</span>
  </div>
</div>

<div id="cursor-glow"></div>

<nav>
  <span class="nav-logo">자기소개서</span>
  <a class="nav-back" href="/soi/">← 목록</a>
</nav>

<div class="page-wrap">
  <div class="entry-meta">{{ .Date.Format "2006. 01. 02" }}</div>
  <div class="entry-title">{{ .Title }}</div>
  {{ with .Params.company }}
  <div class="entry-company">{{ . }}</div>
  {{ end }}
  <div class="entry-divider"></div>
  <div class="entry-content">
    {{ .Content }}
  </div>
</div>

<script>
(function () {
  const KEY = "sp_soi_auth";
  const PW  = "Qqaa@&1803";
  const overlay = document.getElementById("pw-overlay");
  if (sessionStorage.getItem(KEY) === "1") { overlay.remove(); return; }
  function attempt() {
    if (document.getElementById("pw-input").value === PW) {
      sessionStorage.setItem(KEY, "1"); overlay.remove();
    } else {
      document.getElementById("pw-error").style.display = "block";
      document.getElementById("pw-input").value = "";
      document.getElementById("pw-input").focus();
    }
  }
  document.getElementById("pw-btn").addEventListener("click", attempt);
  document.getElementById("pw-input").addEventListener("keydown", e => { if (e.key === "Enter") attempt(); });
})();

(function () {
  const glow = document.getElementById("cursor-glow");
  document.addEventListener("mousemove", e => {
    glow.style.background = `radial-gradient(600px circle at ${e.clientX}px ${e.clientY}px, rgba(139,124,248,.10) 0%, transparent 70%)`;
  });
})();
</script>
</body>
</html>
