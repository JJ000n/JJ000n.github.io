<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNF 캐릭터 시트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#06080f; --bg2:#0c0e1a; --bg3:#111428; --bg4:#0a0c18;
      --text:#e8ecf4; --muted:#5e6e8a; --sub:#8a9ab8;
      --accent:#8b7cf8; --accent2:#5f8aff; --gold:#e8b84b;
      --border:#181e30; --border2:#222840;
      --epic:#c084fc; --legendary:#fbbf24; --unique:#f97316; --rare:#60a5fa; --uncommon:#4ade80;
      --s-hi:#93c47d; --s-hi-bg:rgba(147,196,125,.12);
      --s-mid:#e8b84b; --s-mid-bg:rgba(232,184,75,.10);
      --s-lo:#f87171; --s-lo-bg:rgba(248,113,113,.10);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;
      line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;}
    a{color:var(--accent);text-decoration:none;}

    /* Nav */
    nav{position:fixed;top:0;left:0;right:0;z-index:200;height:52px;
      display:flex;align-items:center;justify-content:space-between;padding:0 1.8rem;
      background:rgba(6,8,15,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
    .nav-logo{font-family:'Playfair Display',serif;font-size:1rem;}
    .nav-back{font-size:.72rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
      color:var(--muted);transition:color .2s;}
    .nav-back:hover{color:var(--text);}

    /* Layout */
    .wrap{max-width:1080px;margin:0 auto;padding:64px 1.2rem 5rem;position:relative;z-index:1;}

    /* Page header */
    .page-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;
      background:linear-gradient(135deg,#fff 30%,var(--accent) 80%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .page-sub{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);
      letter-spacing:.1em;margin-top:.15rem;}

    /* ── Search bar ── */
    .search-bar{
      display:flex;gap:.6rem;flex-wrap:wrap;align-items:flex-end;
      background:var(--bg2);border:1px solid var(--border2);border-radius:12px;
      padding:.9rem 1.1rem;margin:1.2rem 0;
    }
    .fg{display:flex;flex-direction:column;gap:.25rem;}
    .fg label{font-size:.6rem;color:var(--muted);letter-spacing:.08em;
      font-family:'JetBrains Mono',monospace;text-transform:uppercase;}
    select,input[type=text]{background:var(--bg3);border:1px solid var(--border2);color:var(--text);
      border-radius:6px;padding:.42rem .65rem;font-size:.86rem;
      font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;}
    select:focus,input:focus{border-color:var(--accent);}
    select{min-width:110px;} input[type=text]{min-width:190px;}
    .btn{padding:.44rem 1.1rem;border:none;border-radius:6px;font-size:.86rem;
      font-weight:600;cursor:pointer;transition:opacity .2s;font-family:'Inter',sans-serif;}
    .btn-add{background:var(--accent);color:#fff;}
    .btn-add:hover{opacity:.85;}
    .btn-add:disabled{opacity:.4;cursor:not-allowed;}

    /* ── State ── */
    #loading{display:none;text-align:center;padding:2rem;color:var(--muted);font-size:.85rem;}
    .spinner{display:inline-block;width:22px;height:22px;margin-bottom:.5rem;
      border:2px solid var(--border2);border-top-color:var(--accent);
      border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    #error-msg{display:none;padding:.8rem 1rem;
      background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.25);
      border-radius:8px;color:#f87171;font-size:.83rem;margin-bottom:.8rem;}

    /* ── Roster tabs ── */
    .roster-wrap{margin-bottom:1rem;}
    .roster-tabs{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;}
    .roster-tab{
      display:flex;align-items:center;gap:.5rem;
      padding:.38rem .75rem;border-radius:8px;cursor:pointer;
      border:1px solid var(--border2);background:var(--bg2);
      font-size:.82rem;transition:all .18s;color:var(--sub);
    }
    .roster-tab:hover{border-color:var(--accent);color:var(--text);}
    .roster-tab.active{background:rgba(139,124,248,.12);border-color:var(--accent);color:var(--text);}
    .roster-tab .tab-lv{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);}
    .roster-tab .tab-score{font-family:'JetBrains Mono',monospace;font-size:.68rem;
      padding:1px 6px;border-radius:4px;
      background:var(--s-hi-bg);color:var(--s-hi);border:1px solid rgba(147,196,125,.25);}
    .roster-tab .tab-x{font-size:.75rem;color:var(--muted);margin-left:.1rem;
      line-height:1;opacity:.6;cursor:pointer;}
    .roster-tab .tab-x:hover{opacity:1;color:#f87171;}

    /* ── Compare table ── */
    .compare-wrap{
      overflow-x:auto;margin-bottom:1.2rem;
      background:var(--bg2);border:1px solid var(--border2);border-radius:12px;
    }
    .compare-table{border-collapse:collapse;min-width:100%;font-size:.78rem;}
    .compare-table th{
      padding:.5rem .75rem;text-align:left;white-space:nowrap;
      font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.08em;
      text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);
      background:var(--bg3);
    }
    .compare-table td{padding:.45rem .75rem;border-bottom:1px solid var(--border);vertical-align:middle;}
    .compare-table tr:last-child td{border-bottom:none;}
    .compare-table tr.active-row td{background:rgba(139,124,248,.05);}
    .compare-table tr:hover td{background:rgba(139,124,248,.04);}
    .cmp-name{font-weight:600;cursor:pointer;}
    .cmp-name:hover{color:var(--accent);}
    .cmp-job{font-size:.72rem;color:var(--muted);}
    .cmp-sc{font-family:'JetBrains Mono',monospace;font-size:.82rem;}
    .bar-wrap{display:flex;align-items:center;gap:.5rem;}
    .bar{height:6px;border-radius:3px;min-width:2px;transition:width .4s;}

    /* ── Section ── */
    .section{margin-bottom:1.2rem;}
    .sec-head{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.14em;
      text-transform:uppercase;color:var(--muted);
      padding:.3rem .75rem;margin-bottom:.55rem;
      background:var(--bg3);border-left:3px solid var(--accent);border-radius:0 5px 5px 0;}

    /* ── Char banner ── */
    .char-banner{
      background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 100%);
      border:1px solid var(--border2);border-radius:12px;
      padding:1.1rem 1.4rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;
    }
    .char-name{font-family:'Playfair Display',serif;font-size:1.5rem;}
    .char-tags{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.3rem;}
    .c-tag{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.05em;
      padding:2px 7px;border-radius:4px;border:1px solid var(--border2);color:var(--sub);}
    .c-tag.lv{border-color:rgba(139,124,248,.4);color:var(--accent);}
    .total-score{margin-left:auto;background:var(--bg4);
      border:1px solid rgba(147,196,125,.3);border-radius:10px;
      padding:.6rem 1.1rem;text-align:center;min-width:100px;}
    .ts-label{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--muted);letter-spacing:.1em;}
    .ts-value{font-family:'JetBrains Mono',monospace;font-size:1.5rem;color:var(--s-hi);line-height:1.1;}
    .ts-sub{font-size:.58rem;color:var(--muted);margin-top:.05rem;}

    /* ── Equipment grid ── */
    .equip-grid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;}
    @media(max-width:560px){.equip-grid{grid-template-columns:1fr;}}
    .equip-row{display:flex;align-items:flex-start;gap:.6rem;
      background:var(--bg2);border:1px solid var(--border);border-radius:9px;
      padding:.5rem .7rem;transition:border-color .18s;}
    .equip-row:hover{border-color:var(--border2);}
    .equip-row.enchanted{border-left:2px solid var(--accent);}
    .slot-icon{width:34px;height:34px;flex-shrink:0;image-rendering:pixelated;
      border-radius:5px;background:var(--bg3);padding:2px;border:1px solid var(--border2);}
    .slot-icon.empty{opacity:.2;filter:grayscale(1);}
    .equip-info{flex:1;min-width:0;}
    .equip-top{display:flex;align-items:center;justify-content:space-between;gap:.3rem;}
    .equip-slot{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);}
    .ra{display:flex;gap:.25rem;align-items:center;flex-shrink:0;}
    .reinf{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--accent2);}
    .amp-tag{font-size:.62rem;color:#fb923c;border:1px solid rgba(251,146,60,.3);padding:0 4px;border-radius:3px;}
    .equip-name{font-size:.8rem;font-weight:600;margin-top:.08rem;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .equip-name.rarity-에픽{color:var(--epic);}
    .equip-name.rarity-레전더리{color:var(--legendary);}
    .equip-name.rarity-유니크{color:var(--unique);}
    .equip-name.rarity-레어{color:var(--rare);}
    .equip-name.rarity-언커먼{color:var(--uncommon);}
    .equip-name.empty{color:var(--border2);font-weight:400;font-style:italic;}
    .enc-row{display:flex;align-items:flex-start;justify-content:space-between;gap:.3rem;margin-top:.2rem;}
    .enc-txt{font-size:.7rem;color:var(--sub);line-height:1.4;flex:1;min-width:0;}
    .sc-badge{flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:.66rem;font-weight:600;
      padding:1px 5px;border-radius:4px;line-height:1.6;}
    .sc-badge.hi{background:var(--s-hi-bg);color:var(--s-hi);border:1px solid rgba(147,196,125,.3);}
    .sc-badge.mid{background:var(--s-mid-bg);color:var(--s-mid);border:1px solid rgba(232,184,75,.3);}
    .sc-badge.lo{background:var(--s-lo-bg);color:var(--s-lo);border:1px solid rgba(248,113,113,.3);}
    .sc-badge.zero{color:var(--border2);}

    /* ── Stats ── */
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:.35rem;}
    .stat-item{background:var(--bg2);border:1px solid var(--border);border-radius:7px;
      padding:.38rem .65rem;display:flex;justify-content:space-between;align-items:center;}
    .stat-name{font-size:.73rem;color:var(--sub);}
    .stat-val{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--text);}

    /* ── Avatar ── */
    .avatar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.4rem;}
    .avatar-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:.55rem .75rem;}
    .av-slot{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);}
    .av-name{font-size:.8rem;font-weight:500;margin-top:.08rem;}
    .av-opt{font-size:.7rem;color:var(--accent);margin-top:.12rem;}
    .emb-list{display:flex;flex-wrap:wrap;gap:.2rem;margin-top:.25rem;}
    .emb{font-size:.6rem;padding:1px 5px;border-radius:3px;border:1px solid var(--border2);color:var(--muted);}
    .emb.pl{border-color:rgba(139,124,248,.4);color:var(--accent);}
    .emb.gd{border-color:rgba(232,184,75,.35);color:var(--gold);}

    /* ── Set / Creature ── */
    .set-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;
      padding:.65rem .85rem;margin-bottom:.45rem;}
    .set-top{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}
    .set-name{font-weight:600;font-size:.85rem;}
    .set-lv{font-family:'JetBrains Mono',monospace;font-size:.7rem;}
    .set-lv .act{color:var(--s-hi);}
    .set-items{font-size:.72rem;color:var(--sub);margin-top:.25rem;}
    .creature-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:.7rem .9rem;}
    .cr-name{font-weight:600;font-size:.88rem;}
    .cr-rarity{font-size:.7rem;color:var(--muted);margin-top:.08rem;}
    .cr-arts{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.35rem;}
    .art-tag{font-size:.68rem;padding:2px 6px;border-radius:4px;background:var(--bg3);border:1px solid var(--border2);color:var(--sub);}

    /* Empty state */
    .empty-state{text-align:center;padding:3.5rem 1rem;color:var(--muted);}
    .empty-icon{font-size:2.2rem;margin-bottom:.8rem;opacity:.3;}
    .empty-hint{font-size:.8rem;margin-top:.4rem;}

    #cursor-glow{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(600px circle at -999px -999px,rgba(139,124,248,.07) 0%,transparent 70%);}
  </style>
</head>
<body>
<div id="cursor-glow"></div>
<nav>
  <span class="nav-logo">취미</span>
  <a class="nav-back" href="/">← 홈</a>
</nav>

<div class="wrap">
  <div style="margin-bottom:.9rem">
    <div class="page-title">DNF 캐릭터 시트</div>
    <div class="page-sub">DUNGEON &amp; FIGHTER · MULTI CHARACTER SHEET</div>
  </div>

  <!-- 검색 -->
  <div class="search-bar">
    <div class="fg">
      <label>서버</label>
      <select id="inp-server">
        <option>카인</option><option>디레지에</option><option>시로코</option>
        <option>바칼</option><option>하자드</option><option>안톤</option><option>카시야스</option>
      </select>
    </div>
    <div class="fg">
      <label>캐릭터명</label>
      <input id="inp-name" type="text" placeholder="캐릭터 이름" autocomplete="off">
    </div>
    <button class="btn btn-add" id="btn-add" onclick="addCharacter()">+ 캐릭터 추가</button>
  </div>

  <div id="error-msg"></div>
  <div id="loading"><div class="spinner"></div><br>불러오는 중...</div>

  <!-- 캐릭터가 없을 때 -->
  <div id="empty-state" class="empty-state">
    <div class="empty-icon">⚔</div>
    <div>캐릭터를 추가해주세요</div>
    <div class="empty-hint" style="color:var(--border2)">서버와 캐릭터명을 입력 후 추가 버튼을 누르세요</div>
  </div>

  <!-- 캐릭터 있을 때 -->
  <div id="main-area" style="display:none">

    <!-- 탭 -->
    <div class="roster-wrap">
      <div class="roster-tabs" id="roster-tabs"></div>
    </div>

    <!-- 비교 테이블 (2명 이상일 때) -->
    <div id="compare-section" style="display:none;margin-bottom:1.2rem;">
      <div class="sec-head">캐릭터 비교</div>
      <div class="compare-wrap">
        <table class="compare-table">
          <thead>
            <tr>
              <th>캐릭터</th>
              <th>직업</th>
              <th>Lv</th>
              <th style="text-align:right">마법부여 합계</th>
              <th style="min-width:160px">점수 분포</th>
              <th>에픽</th><th>레전더리</th><th>유니크</th>
            </tr>
          </thead>
          <tbody id="compare-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- 캐릭터 상세 -->
    <div id="char-detail">
      <div class="section">
        <div class="char-banner">
          <div>
            <div class="char-name" id="r-name"></div>
            <div class="char-tags">
              <span class="c-tag lv" id="r-lv"></span>
              <span class="c-tag" id="r-server"></span>
              <span class="c-tag" id="r-job"></span>
            </div>
          </div>
          <div class="total-score">
            <div class="ts-label">ENCHANT</div>
            <div class="ts-value" id="r-score">—</div>
            <div class="ts-sub">TOTAL SCORE</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="sec-head">장비 &amp; 마법부여</div>
        <div class="equip-grid" id="equip-grid"></div>
      </div>

      <div class="section">
        <div class="sec-head">주요 스탯</div>
        <div class="stat-grid" id="stat-grid"></div>
      </div>

      <div class="section" id="avatar-section">
        <div class="sec-head">아바타</div>
        <div class="avatar-grid" id="avatar-grid"></div>
      </div>

      <div class="section" id="set-section" style="display:none">
        <div class="sec-head">세트 아이템</div>
        <div id="set-list"></div>
      </div>

      <div class="section" id="creature-section" style="display:none">
        <div class="sec-head">크리처</div>
        <div class="creature-card" id="creature-card"></div>
      </div>
    </div>
  </div>
</div><!-- .wrap -->

<script>
const API_BASE = "https://dnf-api-exml.onrender.com";

const SLOT_ORDER = ["무기","머리 갑옷","상체 갑옷","하체 갑옷","어깨 갑옷","손 갑옷",
                    "목걸이","팔찌","반지","보조 장비","마법석","귀걸이"];
const SLOT_ICON  = {
  "무기":"/dnf/image1.png","머리 갑옷":"/dnf/image2.png",
  "상체 갑옷":"/dnf/image4.png","하체 갑옷":"/dnf/image3.png",
  "어깨 갑옷":"/dnf/image8.png","손 갑옷":"/dnf/image6.png",
  "목걸이":"/dnf/image11.png","팔찌":"/dnf/image12.png",
  "반지":"/dnf/image5.png","보조 장비":"/dnf/image7.png",
  "마법석":"/dnf/image9.png","귀걸이":"/dnf/image10.png",
};
const STAT_DISPLAY = ["HP","MP","힘","지능","체력","정신력","물리 공격력","마법 공격력",
  "물리 방어력","마법 방어력","화속성 강화","수속성 강화","명속성 강화","암속성 강화",
  "화속성 저항","수속성 저항","명속성 저항","암속성 저항","크리티컬 히트","공격 속도","캐스팅 속도"];

// ── State ─────────────────────────────────────────────────────────────────────
let roster   = [];  // 캐릭터 데이터 배열
let activeIdx = 0;  // 현재 선택된 캐릭터 인덱스

// ── 캐릭터 추가 ───────────────────────────────────────────────────────────────
async function addCharacter() {
  const server = document.getElementById("inp-server").value;
  const name   = document.getElementById("inp-name").value.trim();
  if (!name) return showError("캐릭터명을 입력해주세요.");

  // 중복 체크
  if (roster.find(c => c.server === server && c.characterName === name)) {
    return showError(`이미 추가된 캐릭터입니다: [${server}] ${name}`);
  }

  const btn = document.getElementById("btn-add");
  btn.disabled = true;
  document.getElementById("loading").style.display = "block";
  document.getElementById("error-msg").style.display = "none";

  try {
    const resp = await fetch(`${API_BASE}/character?${new URLSearchParams({server, name})}`);
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || `오류 ${resp.status}`);

    roster.push(data);
    activeIdx = roster.length - 1;
    document.getElementById("inp-name").value = "";

    renderAll();
    document.getElementById("empty-state").style.display = "none";
    document.getElementById("main-area").style.display   = "block";
  } catch(e) {
    showError(e.message || "서버 연결 실패. 잠시 후 다시 시도하세요.");
  } finally {
    btn.disabled = false;
    document.getElementById("loading").style.display = "none";
  }
}

function removeCharacter(idx) {
  roster.splice(idx, 1);
  if (!roster.length) {
    document.getElementById("main-area").style.display  = "none";
    document.getElementById("empty-state").style.display = "block";
    return;
  }
  activeIdx = Math.min(activeIdx, roster.length - 1);
  renderAll();
}

function selectCharacter(idx) {
  activeIdx = idx;
  renderAll();
}

function showError(msg) {
  const el = document.getElementById("error-msg");
  el.textContent = "⚠ " + msg;
  el.style.display = "block";
}

// ── 전체 렌더 ─────────────────────────────────────────────────────────────────
function renderAll() {
  renderTabs();
  renderCompare();
  renderDetail(roster[activeIdx]);
}

// ── 탭 ────────────────────────────────────────────────────────────────────────
function renderTabs() {
  const wrap = document.getElementById("roster-tabs");
  wrap.innerHTML = "";
  roster.forEach((c, i) => {
    const sc = c.enchantTotal || 0;
    const div = document.createElement("div");
    div.className = `roster-tab${i === activeIdx ? " active" : ""}`;
    div.innerHTML = `
      <div>
        <span style="font-weight:600">${c.characterName}</span>
        <span class="tab-lv"> Lv.${c.level}</span>
      </div>
      ${sc ? `<span class="tab-score">${sc}</span>` : ""}
      <span class="tab-x" data-idx="${i}" onclick="event.stopPropagation();removeCharacter(${i})">✕</span>`;
    div.addEventListener("click", () => selectCharacter(i));
    wrap.appendChild(div);
  });
}

// ── 비교 테이블 ───────────────────────────────────────────────────────────────
function renderCompare() {
  const section = document.getElementById("compare-section");
  if (roster.length < 2) { section.style.display = "none"; return; }
  section.style.display = "block";

  const maxScore = Math.max(...roster.map(c => c.enchantTotal || 0)) || 1;
  const tbody = document.getElementById("compare-tbody");
  tbody.innerHTML = "";

  // 희귀도별 장비 수 계산
  const rarityCount = (c, rarity) =>
    (c.equipment || []).filter(e => e.rarity === rarity).length;

  roster.forEach((c, i) => {
    const sc  = c.enchantTotal || 0;
    const pct = Math.round(sc / maxScore * 100);
    const scCls = sc >= 60 ? "var(--s-hi)" : sc >= 30 ? "var(--s-mid)" : "var(--s-lo)";
    const tr = document.createElement("tr");
    if (i === activeIdx) tr.className = "active-row";
    tr.innerHTML = `
      <td><span class="cmp-name" onclick="selectCharacter(${i})">${c.characterName}</span></td>
      <td><span class="cmp-job">${c.jobGrowName || c.jobName}</span></td>
      <td><span style="font-family:'JetBrains Mono',monospace;font-size:.75rem">${c.level}</span></td>
      <td style="text-align:right">
        <span class="cmp-sc" style="color:${scCls}">${sc}</span>
      </td>
      <td>
        <div class="bar-wrap">
          <div class="bar" style="width:${pct}%;background:${scCls};height:6px;border-radius:3px"></div>
          <span style="font-size:.62rem;color:var(--muted)">${pct}%</span>
        </div>
      </td>
      <td style="color:var(--epic);font-family:'JetBrains Mono',monospace;font-size:.75rem">${rarityCount(c,'에픽')}</td>
      <td style="color:var(--legendary);font-family:'JetBrains Mono',monospace;font-size:.75rem">${rarityCount(c,'레전더리')}</td>
      <td style="color:var(--unique);font-family:'JetBrains Mono',monospace;font-size:.75rem">${rarityCount(c,'유니크')}</td>`;
    tbody.appendChild(tr);
  });
}

// ── 캐릭터 상세 ───────────────────────────────────────────────────────────────
function renderDetail(d) {
  if (!d) return;

  document.getElementById("r-name").textContent   = d.characterName;
  document.getElementById("r-lv").textContent     = `Lv.${d.level}`;
  document.getElementById("r-server").textContent = d.server;
  document.getElementById("r-job").textContent    = `${d.jobName} · ${d.jobGrowName}`;
  document.getElementById("r-score").textContent  = d.enchantTotal || 0;

  // 장비
  const equipGrid = document.getElementById("equip-grid");
  equipGrid.innerHTML = "";
  const equipMap = {};
  for (const eq of (d.equipment || [])) equipMap[eq.slot] = eq;

  for (const slot of SLOT_ORDER) {
    const eq     = equipMap[slot];
    const icon   = SLOT_ICON[slot] || "";
    const sc     = eq?.enchantScore || 0;
    const scCls  = sc >= 15 ? "hi" : sc >= 8 ? "mid" : sc > 0 ? "lo" : "zero";
    const rarity = eq?.rarity || "";
    const nameCls = rarity ? `rarity-${rarity}` : "empty";
    const reinf  = eq?.reinforce    ? `<span class="reinf">+${eq.reinforce}</span>` : "";
    const amp    = eq?.amplification? `<span class="amp-tag">${eq.amplification}</span>` : "";
    const encTxt = eq?.enchantText  ? `<span class="enc-txt">${eq.enchantText}</span>` : "";

    equipGrid.insertAdjacentHTML("beforeend", `
      <div class="equip-row${sc > 0 ? ' enchanted' : ''}">
        <img class="slot-icon${!eq ? ' empty' : ''}" src="${icon}" alt="${slot}">
        <div class="equip-info">
          <div class="equip-top">
            <span class="equip-slot">${slot}</span>
            <div class="ra">${reinf}${amp}</div>
          </div>
          <div class="equip-name ${nameCls}">${eq?.itemName || "—"}</div>
          ${encTxt || sc > 0 ? `
          <div class="enc-row">
            ${encTxt}
            <span class="sc-badge ${scCls}">${sc > 0 ? sc : ""}</span>
          </div>` : ""}
        </div>
      </div>`);
  }

  // 스탯
  const statGrid = document.getElementById("stat-grid");
  statGrid.innerHTML = "";
  const status = d.status || {};
  for (const key of STAT_DISPLAY) {
    if (status[key] !== undefined) {
      statGrid.insertAdjacentHTML("beforeend", `
        <div class="stat-item">
          <span class="stat-name">${key}</span>
          <span class="stat-val">${Number(status[key]).toLocaleString()}</span>
        </div>`);
    }
  }

  // 아바타
  const avGrid = document.getElementById("avatar-grid");
  avGrid.innerHTML = "";
  for (const av of (d.avatar || [])) {
    const emblems = (av.emblems || []).map(e => {
      const nm  = e.name || "";
      const cls = nm.includes("플래티넘") ? "pl" : nm.includes("골드") ? "gd" : "";
      return `<span class="emb ${cls}">${nm}</span>`;
    }).join("");
    avGrid.insertAdjacentHTML("beforeend", `
      <div class="avatar-card">
        <div class="av-slot">${av.slot}</div>
        <div class="av-name">${av.itemName || "—"}</div>
        ${av.optionAbility ? `<div class="av-opt">${av.optionAbility}</div>` : ""}
        ${emblems ? `<div class="emb-list">${emblems}</div>` : ""}
      </div>`);
  }

  // 세트
  const sets = d.oath || [];
  const setSection = document.getElementById("set-section");
  const setList    = document.getElementById("set-list");
  setList.innerHTML = "";
  if (sets.length) {
    setSection.style.display = "block";
    for (const s of sets) {
      setList.insertAdjacentHTML("beforeend", `
        <div class="set-card">
          <div class="set-top">
            <span class="set-name">${s.setName}</span>
            <span class="set-lv"><span class="act">${s.active}세트</span><span style="color:var(--muted)"> / ${s.maxLevel}</span></span>
          </div>
          <div class="set-items">${(s.items||[]).join(" · ")}</div>
        </div>`);
    }
  } else { setSection.style.display = "none"; }

  // 크리처
  const cr = d.creature;
  const creatureSection = document.getElementById("creature-section");
  const creatureCard    = document.getElementById("creature-card");
  creatureCard.innerHTML = "";
  if (cr?.itemName) {
    creatureSection.style.display = "block";
    const arts = (cr.artifact || []).map(a =>
      `<span class="art-tag">${a.slot}: ${a.name}</span>`).join("");
    creatureCard.innerHTML = `
      <div class="cr-name">${cr.itemName}</div>
      <div class="cr-rarity">${cr.itemRarity || ""}</div>
      ${arts ? `<div class="cr-arts">${arts}</div>` : ""}`;
  } else { creatureSection.style.display = "none"; }
}

// ── Enter & cursor glow ───────────────────────────────────────────────────────
document.getElementById("inp-name").addEventListener("keydown", e => {
  if (e.key === "Enter") addCharacter();
});
(function() {
  const g = document.getElementById("cursor-glow");
  document.addEventListener("mousemove", e => {
    g.style.background =
      `radial-gradient(600px circle at ${e.clientX}px ${e.clientY}px,rgba(139,124,248,.07) 0%,transparent 70%)`;
  });
})();
</script>
</body>
</html>
