<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNF 캐릭터 시트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06080f; --bg2: #0c0e1a; --bg3: #111428;
      --text: #e8ecf4; --muted: #5e6e8a; --sub: #8a9ab8;
      --accent: #8b7cf8; --accent2: #5f8aff; --gold: #e8b84b;
      --border: #181e30; --border2: #222840;
      --green: #4ade80; --red: #f87171; --orange: #fb923c;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      line-height: 1.6; -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: 58px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem;
      background: rgba(6,8,15,.85); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.05rem; }
    .nav-back { font-size: .78rem; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); transition: color .2s; }
    .nav-back:hover { color: var(--text); }

    .wrap { max-width: 1100px; margin: 0 auto; padding: 80px 1.5rem 5rem; position: relative; z-index: 1; }

    .page-title {
      font-family: 'Playfair Display', serif; font-size: 1.9rem; font-weight: 700;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 80%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: .3rem;
    }
    .page-sub { font-family: 'JetBrains Mono', monospace; font-size: .7rem; color: var(--muted); letter-spacing: .08em; }

    /* ── Search ── */
    .search-card {
      margin-top: 2rem; padding: 1.6rem 1.8rem;
      background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px;
    }
    .form-row { display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; gap: .4rem; }
    .form-group label { font-size: .72rem; color: var(--muted); letter-spacing: .06em; font-family: 'JetBrains Mono', monospace; }
    .form-group input, .form-group select {
      background: var(--bg3); border: 1px solid var(--border2); color: var(--text);
      border-radius: 8px; padding: .55rem .8rem; font-size: .9rem;
      font-family: 'Inter', sans-serif; outline: none; transition: border-color .2s;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
    .form-group input { min-width: 180px; }
    .form-group select { min-width: 130px; }
    .form-group.wide input { min-width: 260px; }
    .btn-search {
      padding: .58rem 1.4rem; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: .9rem; font-weight: 600;
      cursor: pointer; transition: opacity .2s; white-space: nowrap;
      font-family: 'Inter', sans-serif;
    }
    .btn-search:hover { opacity: .85; }
    .btn-search:disabled { opacity: .4; cursor: not-allowed; }
    .api-hint { margin-top: .8rem; font-size: .72rem; color: var(--muted); }
    .api-hint a { color: var(--accent2); }

    /* ── State ── */
    #loading { display: none; text-align: center; padding: 3rem; color: var(--muted); font-size: .9rem; }
    .spinner { display: inline-block; width: 28px; height: 28px; margin-bottom: .8rem;
      border: 3px solid var(--border2); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-msg { display: none; margin-top: 1.5rem; padding: 1rem 1.2rem;
      background: rgba(248,113,113,.07); border: 1px solid rgba(248,113,113,.25);
      border-radius: 10px; color: var(--red); font-size: .88rem; }

    /* ── Result ── */
    #result { display: none; margin-top: 2rem; }
    .section { margin-bottom: 2rem; }
    .section-title {
      font-family: 'JetBrains Mono', monospace; font-size: .68rem;
      color: var(--muted); letter-spacing: .12em; text-transform: uppercase;
      margin-bottom: .8rem; padding-bottom: .5rem; border-bottom: 1px solid var(--border);
    }

    /* ── Char summary ── */
    .char-summary {
      display: flex; align-items: center; gap: 1.8rem; flex-wrap: wrap;
      padding: 1.2rem 1.5rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    }
    .char-name { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--text); }
    .char-meta { font-size: .82rem; color: var(--sub); }
    .char-meta span { color: var(--accent); font-weight: 600; }
    .score-badge { margin-left: auto; background: var(--bg3); border: 1px solid var(--border2); border-radius: 10px; padding: .5rem 1rem; text-align: right; }
    .score-badge .score-label { font-size: .65rem; color: var(--muted); letter-spacing: .08em; }
    .score-badge .score-value { font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; color: var(--gold); }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .83rem; }
    th { padding: .5rem .8rem; text-align: left; font-family: 'JetBrains Mono', monospace;
      font-size: .62rem; color: var(--muted); letter-spacing: .08em; text-transform: uppercase;
      border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: .55rem .8rem; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(139,124,248,.04); }
    .slot-name { color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: .72rem; white-space: nowrap; }
    .item-name { color: var(--text); font-weight: 500; }
    .rarity-에픽 { color: #c084fc; }
    .rarity-레전더리 { color: var(--gold); }
    .rarity-유니크 { color: #f97316; }
    .rarity-레어 { color: #60a5fa; }
    .rarity-언커먼 { color: var(--green); }
    .enchant-text { color: var(--sub); font-size: .78rem; line-height: 1.5; }
    .enchant-score { font-family: 'JetBrains Mono', monospace; text-align: right; }
    .score-hi { color: var(--green); }
    .score-mid { color: var(--gold); }
    .score-lo { color: var(--red); }
    .score-zero { color: var(--border2); }
    .reinforce-val { color: var(--accent2); font-family: 'JetBrains Mono', monospace; }
    .amp-val { color: var(--orange); font-size: .75rem; }

    /* ── Status grid ── */
    .status-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: .6rem; }
    .stat-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: .5rem .8rem; display: flex; justify-content: space-between; align-items: center; }
    .stat-name { font-size: .78rem; color: var(--sub); }
    .stat-value { font-family: 'JetBrains Mono', monospace; font-size: .85rem; color: var(--text); }

    /* ── Emblems ── */
    .emblem-list { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .2rem; }
    .emblem-tag { font-size: .65rem; padding: 1px 6px; border-radius: 4px; border: 1px solid var(--border2); color: var(--muted); }
    .emblem-tag.platinum { border-color: rgba(139,124,248,.4); color: var(--accent); }
    .emblem-tag.gold-em { border-color: rgba(232,184,75,.4); color: var(--gold); }

    /* ── Set / creature ── */
    .set-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: .8rem 1rem; margin-bottom: .6rem; }
    .set-name { font-weight: 600; color: var(--text); margin-bottom: .2rem; }
    .set-level { font-size: .75rem; font-family: 'JetBrains Mono', monospace; }
    .set-level .active { color: var(--green); }
    .set-items-list { font-size: .78rem; color: var(--sub); margin-top: .3rem; }

    #cursor-glow { position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(600px circle at -999px -999px, rgba(139,124,248,.08) 0%, transparent 70%); }
  </style>
</head>
<body>

<div id="cursor-glow"></div>

<nav>
  <span class="nav-logo">취미</span>
  <a class="nav-back" href="/">← 홈</a>
</nav>

<div class="wrap">
  <div style="margin-bottom:1.8rem">
    <div class="page-title">DNF 캐릭터 시트</div>
    <div class="page-sub">DUNGEON &amp; FIGHTER · CHARACTER SHEET</div>
  </div>

  <div class="search-card">
    <div class="form-row">
      <div class="form-group">
        <label>서버</label>
        <select id="inp-server">
          <option>카인</option><option>디레지에</option><option>시로코</option>
          <option>바칼</option><option>하자드</option><option>안톤</option><option>카시야스</option>
        </select>
      </div>
      <div class="form-group">
        <label>캐릭터명</label>
        <input id="inp-name" type="text" placeholder="캐릭터 이름 입력" autocomplete="off">
      </div>
      <button class="btn-search" id="btn-search" onclick="searchCharacter()">조회</button>
    </div>
  </div>

  <div id="error-msg"></div>
  <div id="loading"><div class="spinner"></div><br>캐릭터 정보를 불러오는 중...</div>

  <div id="result">
    <div class="section">
      <div class="section-title">캐릭터 정보</div>
      <div class="char-summary">
        <div>
          <div class="char-name" id="r-name"></div>
          <div class="char-meta" id="r-meta"></div>
        </div>
        <div class="score-badge">
          <div class="score-label">ENCHANT SCORE</div>
          <div class="score-value" id="r-score">0</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">장비 &amp; 마법부여</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>슬롯</th><th>아이템</th><th>강화/증폭</th><th>마법부여</th><th style="text-align:right">점수</th></tr></thead>
          <tbody id="equip-tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="section">
      <div class="section-title">주요 스탯</div>
      <div class="status-grid" id="status-grid"></div>
    </div>

    <div class="section">
      <div class="section-title">아바타</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>슬롯</th><th>아바타</th><th>옵션</th><th>엠블렘</th></tr></thead>
          <tbody id="avatar-tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="section" id="set-section" style="display:none">
      <div class="section-title">세트 아이템</div>
      <div id="set-list"></div>
    </div>

    <div class="section" id="creature-section" style="display:none">
      <div class="section-title">크리처</div>
      <div id="creature-info" class="char-summary" style="gap:1rem"></div>
    </div>
  </div>
</div>

<script>
// ── 백엔드 URL ────────────────────────────────────────────────────────────────
const API_BASE = "https://dnf-api-exml.onrender.com";

const SLOT_ORDER = [
  "머리 갑옷","상체 갑옷","하체 갑옷","어깨 갑옷","손 갑옷",
  "목걸이","팔찌","반지","보조 장비","마법석","귀걸이","무기"
];

const STAT_DISPLAY = [
  "HP","MP","힘","지능","체력","정신력",
  "물리 공격력","마법 공격력","물리 방어력","마법 방어력",
  "화속성 강화","수속성 강화","명속성 강화","암속성 강화",
  "화속성 저항","수속성 저항","명속성 저항","암속성 저항",
  "크리티컬 히트","공격 속도","캐스팅 속도"
];

// ── 검색 ──────────────────────────────────────────────────────────────────────
async function searchCharacter() {
  const server = document.getElementById("inp-server").value;
  const name   = document.getElementById("inp-name").value.trim();
  if (!name) return showError("캐릭터명을 입력해주세요.");

  const btn = document.getElementById("btn-search");
  btn.disabled = true;
  document.getElementById("loading").style.display   = "block";
  document.getElementById("result").style.display    = "none";
  document.getElementById("error-msg").style.display = "none";

  try {
    const params = new URLSearchParams({ server, name });
    const resp = await fetch(`${API_BASE}/character?${params}`);
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || `오류 ${resp.status}`);
    renderResult(data);
    document.getElementById("result").style.display = "block";
  } catch (e) {
    showError(e.message || "서버 연결 실패. 잠시 후 다시 시도해주세요.");
  } finally {
    btn.disabled = false;
    document.getElementById("loading").style.display = "none";
  }
}

function showError(msg) {
  const el = document.getElementById("error-msg");
  el.textContent = "⚠ " + msg;
  el.style.display = "block";
}

// ── 결과 렌더 ─────────────────────────────────────────────────────────────────
function renderResult(d) {
  // 캐릭터 요약
  document.getElementById("r-name").textContent = d.characterName;
  document.getElementById("r-meta").innerHTML =
    `<span>${d.server}</span> · Lv.${d.level} · ${d.jobName} (${d.jobGrowName})`;
  document.getElementById("r-score").textContent = d.enchantTotal;

  // 장비
  const tbody = document.getElementById("equip-tbody");
  tbody.innerHTML = "";
  const sorted = [...(d.equipment || [])].sort((a, b) => {
    const ai = SLOT_ORDER.indexOf(a.slot), bi = SLOT_ORDER.indexOf(b.slot);
    return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
  });
  for (const eq of sorted) {
    const sc = eq.enchantScore || 0;
    const scCls = sc >= 15 ? "score-hi" : sc >= 8 ? "score-mid" : sc > 0 ? "score-lo" : "score-zero";
    const reinforce = eq.reinforce ? `<span class="reinforce-val">+${eq.reinforce}</span>` : "";
    const amp = eq.amplification ? `<br><span class="amp-val">${eq.amplification}</span>` : "";
    tbody.insertAdjacentHTML("beforeend", `
      <tr>
        <td class="slot-name">${eq.slot}</td>
        <td><span class="item-name rarity-${eq.rarity}">${eq.itemName || "—"}</span></td>
        <td>${reinforce}${amp}</td>
        <td class="enchant-text">${eq.enchantText || '<span style="color:var(--border2)">—</span>'}</td>
        <td class="enchant-score"><span class="${scCls}">${sc > 0 ? sc : "—"}</span></td>
      </tr>`);
  }

  // 스탯
  const grid = document.getElementById("status-grid");
  grid.innerHTML = "";
  const status = d.status || {};
  for (const key of STAT_DISPLAY) {
    if (status[key] !== undefined) {
      grid.insertAdjacentHTML("beforeend", `
        <div class="stat-item">
          <span class="stat-name">${key}</span>
          <span class="stat-value">${Number(status[key]).toLocaleString()}</span>
        </div>`);
    }
  }

  // 아바타
  const avTbody = document.getElementById("avatar-tbody");
  avTbody.innerHTML = "";
  for (const av of (d.avatar || [])) {
    const emblems = (av.emblems || []).map(e => {
      const name = e.name || "";
      const cls  = name.includes("플래티넘") ? "platinum" : name.includes("골드") ? "gold-em" : "";
      return `<span class="emblem-tag ${cls}">${name}</span>`;
    }).join("");
    avTbody.insertAdjacentHTML("beforeend", `
      <tr>
        <td class="slot-name">${av.slot}</td>
        <td class="item-name">${av.itemName || "—"}</td>
        <td class="enchant-text">${av.optionAbility || "—"}</td>
        <td><div class="emblem-list">${emblems || "—"}</div></td>
      </tr>`);
  }

  // 세트
  const setSection = document.getElementById("set-section");
  const setList    = document.getElementById("set-list");
  setList.innerHTML = "";
  const sets = d.oath || [];
  if (sets.length) {
    setSection.style.display = "block";
    for (const s of sets) {
      setList.insertAdjacentHTML("beforeend", `
        <div class="set-card">
          <div class="set-name">${s.setName}</div>
          <div class="set-level"><span class="active">${s.active}세트</span> <span style="color:var(--muted)">/ ${s.maxLevel}세트</span></div>
          <div class="set-items-list">${(s.items || []).join(" · ")}</div>
        </div>`);
    }
  } else {
    setSection.style.display = "none";
  }

  // 크리처
  const creatureSection = document.getElementById("creature-section");
  const creatureInfo    = document.getElementById("creature-info");
  creatureInfo.innerHTML = "";
  const cr = d.creature;
  if (cr?.itemName) {
    creatureSection.style.display = "block";
    const arts = (cr.artifact || [])
      .map(a => `<span style="color:var(--sub)">${a.slot}: ${a.name}</span>`)
      .join(" / ");
    creatureInfo.innerHTML = `
      <div>
        <div class="char-name" style="font-size:1rem">${cr.itemName}</div>
        <div class="char-meta">${cr.itemRarity || ""}</div>
        ${arts ? `<div style="font-size:.8rem;margin-top:.4rem;color:var(--muted)">${arts}</div>` : ""}
      </div>`;
  } else {
    creatureSection.style.display = "none";
  }
}

// ── Enter & cursor glow ───────────────────────────────────────────────────────
document.getElementById("inp-name").addEventListener("keydown", e => {
  if (e.key === "Enter") searchCharacter();
});

(function () {
  const glow = document.getElementById("cursor-glow");
  document.addEventListener("mousemove", e => {
    glow.style.background =
      `radial-gradient(600px circle at ${e.clientX}px ${e.clientY}px, rgba(139,124,248,.08) 0%, transparent 70%)`;
  });
})();
</script>
</body>
</html>
