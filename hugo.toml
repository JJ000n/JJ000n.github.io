baseURL = "https://JJ000n.github.io/"
languageCode = "ko-kr"
title = "Seongjun Park"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[params]
  env = "production"
  title = "Seongjun Park"
  description = "개발 기록과 메모를 남기는 공간"
  author = "Seongjun Park"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  TocOpen = false
  comments = false
  formspreeId = "xkopdoez"

  [params.profileMode]
    enabled = true
    title = "Seongjun Park"
    subtitle = "개발 기록과 생각을 남기는 공간"

    [[params.profileMode.buttons]]
      name = "Posts"
      url = "/posts"

    [[params.profileMode.buttons]]
      name = "CV"
      url = "/cv"

    [[params.profileMode.buttons]]
      name = "Tags"
      url = "/tags"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20

  [[menu.main]]
    identifier = "cv"
    name = "CV"
    url = "/cv/"
    weight = 30

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 40

[taxonomies]
  category = "categories"
  tag = "tags"

[markup.highlight]
  noClasses = false
